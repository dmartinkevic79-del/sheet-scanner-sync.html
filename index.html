<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Batch Mobile Scanner + Decoder</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121212;
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-border: rgba(255, 255, 255, 0.15);
      --text: #f0f0f0;
      --muted: #a0a0a0;
      --primary: #4f98a3;
      --primary-active: #3a7a85;
      --danger: #bb653b;
      --success: #6daa45;
      --radius: 1rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    .header {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }

    .title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; }

    .scanner-container {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s ease;
    }
    
    .scanner-container.flash {
      box-shadow: inset 0 0 0 8px var(--success);
    }

    #reader {
      width: 100%;
      height: 100%;
      border: none;
    }

    .batch-panel {
      position: absolute;
      bottom: 15px;
      left: 15px;
      right: 15px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .stats {
      display: flex;
      flex-direction: column;
      gap: 5px;
      font-size: 0.9rem;
    }

    .stats-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats .count { font-weight: 700; font-size: 1.2rem; color: var(--success); }
    .last-scan { 
      font-family: monospace; 
      font-size: 0.9rem; 
      color: var(--text); 
      background: rgba(0,0,0,0.3); 
      padding: 6px 10px; 
      border-radius: 6px; 
      text-align: center;
      word-break: break-all;
    }

    .controls { display: flex; gap: 10px; }

    .btn {
      flex: 1;
      min-height: 50px;
      border: none;
      border-radius: 0.6rem;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
    }

    .btn:active { transform: scale(0.98); }
    .btn.primary { background: var(--primary); border-color: var(--primary); }
    .btn.danger { background: transparent; border-color: var(--danger); color: var(--danger); }

    .settings {
      padding: 10px 15px 15px 15px;
      background: var(--bg);
    }
    
    .input-url {
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text);
      padding: 12px;
      border-radius: 0.6rem;
      font-family: monospace;
      font-size: 0.8rem;
    }
    
    #startScreen {
      position: absolute;
      inset: 0;
      background: var(--bg);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <div class="header">
    <div class="title">BATCH SCANNER + DECODER</div>
  </div>

  <div class="scanner-container" id="scanContainer">
    <div id="startScreen">
      <button class="btn primary" style="width: 80%; max-width: 300px; height: 60px;" onclick="startScanner()">ВКЛЮЧИТЬ КАМЕРУ</button>
    </div>
    
    <div id="reader"></div>
    
    <div class="batch-panel" id="batchPanel" style="display: none;">
      <div class="stats">
        <div class="stats-header">
          <span>В очереди:</span>
          <span class="count" id="scanCount">0</span>
        </div>
        <div class="last-scan" id="lastCode">Ожидание штрихкода...</div>
      </div>
      <div class="controls">
        <button class="btn danger" onclick="clearBatch()">Очистить</button>
        <button class="btn primary" id="sendBtn" onclick="sendBatch()">ОТПРАВИТЬ ПАРТИЮ</button>
      </div>
    </div>
  </div>

  <div class="settings">
    <input type="text" class="input-url" id="apiUrl" value="https://script.google.com/macros/s/AKfycbxXJh5XKFOVGcv7hp6YUuUXh4nwp2RNjiyPES3XUfhXtHMua9lQCu_hQBCLM0jkkCM/exec" placeholder="Вставьте URL Google Apps Script Web App..." />
  </div>

  <script>
    let html5QrCode;
    let scannedBatch = new Map();

    // АЛГОРИТМ ДЕШИФРАТОРА
    const cyrMap = {С:'N',с:'n',Й:'B',й:'b',ш:'H',Ш:'H',Ф:'S',ф:'s',Ч:'U',ч:'u',У:'Y',у:'y',Ц:'X',ц:'x',М:'K',м:'k',Г:'V',г:'v'};
    
    function ruToEn(s) {
      return [...s].map(c => cyrMap[c] || c).join('');
    }
    
    function normalizeCode(raw) {
      let s = String(raw || '').trim();
      if (s.includes('-*-')) s = s.split('-*-')[1];
      if (s.startsWith('*')) s = s.slice(1);
      s = ruToEn(s).replace(/\s+/g, '');
      return s.replace(/[^A-Za-z0-9+/]/g, '').slice(0, 8);
    }

    function b64ToBytes(s) {
      const bin = atob(s.padEnd(8, '='));
      return [...bin].map(ch => ch.charCodeAt(0));
    }

    function first5ToBigInt(bytes) {
      let x = 0n;
      for (let i = 0; i < 5; i++) x = (x << 8n) | BigInt(bytes[i]);
      return x;
    }

    function decodeOne(raw) {
      const norm = normalizeCode(raw);
      if (norm.length < 8) return { norm, raw, error: 'Недостаточно символов' };
      try {
        const bytes = b64ToBytes(norm);
        const idHyp = first5ToBigInt(bytes).toString();
        return { norm, raw, idHyp, last: bytes[5] };
      } catch (e) {
        return { norm, raw, error: 'Ошибка Base64' };
      }
    }

    // ИНТЕРФЕЙС И ЛОГИКА СКАНИРОВАНИЯ
    function updateUI() {
      document.getElementById('scanCount').textContent = scannedBatch.size;
      const arr = Array.from(scannedBatch.values());
      if (arr.length > 0) {
        const last = arr[arr.length - 1];
        document.getElementById('lastCode').textContent = `${last.norm} | ID: ${last.idHyp || 'ОШИБКА'}`;
      } else {
        document.getElementById('lastCode').textContent = 'Ожидание штрихкода...';
      }
    }

    async function startScanner() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('batchPanel').style.display = 'flex';
      
      html5QrCode = new Html5Qrcode("reader");

      const config = { 
        fps: 20, // Ускоренное сканирование
        qrbox: function(viewfinderWidth, viewfinderHeight) {
            // Квадратная рамка для удобного захвата QR и Data Matrix
            const size = Math.min(viewfinderWidth, viewfinderHeight) * 0.75;
            return { width: size, height: size };
        },
        // Запрос максимального качества камеры
        videoConstraints: {
            width: { ideal: 1920 },
            height: { ideal: 1080 }
        }
      };

      try {
        await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
      } catch (err) {
        alert("Ошибка доступа к камере: " + err);
      }
    }

    function onScanSuccess(decodedText) {
      const decoded = decodeOne(decodedText);
      
      // Игнорируем неполные штрихкоды
      if (decoded.error) return;

      // Если такого кода еще нет в текущей партии
      if (!scannedBatch.has(decoded.norm)) {
        scannedBatch.set(decoded.norm, decoded);
        updateUI();
        
        if (navigator.vibrate) navigator.vibrate(100);
        
        const container = document.getElementById('scanContainer');
        container.classList.add('flash');
        setTimeout(() => container.classList.remove('flash'), 200);
      }
    }

    function clearBatch() {
      if(confirm("Очистить текущую очередь?")) {
        scannedBatch.clear();
        updateUI();
      }
    }

    async function sendBatch() {
      if (scannedBatch.size === 0) {
        alert("Очередь пуста. Отсканируйте штрихкоды.");
        return;
      }

      const url = document.getElementById('apiUrl').value.trim();
      if (!url || url === "СЮДА_ВСТАВЬ_ТВОЮ_ССЫЛКУ_НА_APPS_SCRIPT") {
        alert("Укажите правильный URL Google Apps Script.");
        return;
      }

      const btn = document.getElementById('sendBtn');
      const originalText = btn.textContent;
      btn.textContent = "ОТПРАВКА...";
      btn.style.opacity = "0.7";
      btn.disabled = true;

      // Формируем массив объектов для отправки со всеми расшифрованными данными
      const payloadData = Array.from(scannedBatch.values()).map(item => ({
        raw: item.raw,
        norm: item.norm,
        id_hypothesis: item.idHyp,
        byte6: item.last,
        timestamp: new Date().toISOString()
      }));

      const payload = { batch: payloadData };

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.ok) {
          btn.style.backgroundColor = "var(--success)";
          btn.style.borderColor = "var(--success)";
          btn.textContent = "УСПЕШНО!";
          if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
          
          setTimeout(() => {
            scannedBatch.clear();
            updateUI();
            btn.style.backgroundColor = "var(--primary)";
            btn.style.borderColor = "var(--primary)";
            btn.textContent = originalText;
            btn.style.opacity = "1";
            btn.disabled = false;
          }, 1500);
        } else {
          throw new Error(result.error || "Ошибка на сервере");
        }
      } catch (error) {
        alert("Не удалось отправить: " + error.message);
        btn.textContent = "ОШИБКА. ПОВТОРИТЬ?";
        btn.style.backgroundColor = "transparent";
        btn.style.borderColor = "var(--danger)";
        btn.style.color = "var(--danger)";
        btn.style.opacity = "1";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
