<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mobile Scanner</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #121212;
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #f0f0f0;
      --muted: #a0a0a0;
      --primary: #4f98a3;
      --primary-active: #3a7a85;
      --danger: #bb653b;
      --success: #6daa45;
      --radius: 1.2rem;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Satoshi', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Верхняя панель */
    .header {
      padding: 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--glass-border);
      z-index: 10;
    }

    .title { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.1em; }

    /* Зона сканера: занимает максимум доступного места */
    .scanner-container {
      flex: 1;
      position: relative;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    #reader {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Панель результатов поверх камеры (Glassmorphism) */
    .result-panel {
      position: absolute;
      bottom: 20px;
      left: 15px;
      right: 15px;
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .result-panel.hidden {
      transform: translateY(120%);
      opacity: 0;
      pointer-events: none;
    }

    .scanned-text {
      font-family: monospace;
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      word-break: break-all;
      color: var(--success);
    }

    /* Кнопки управления (крупные для пальцев) */
    .controls {
      padding: 15px;
      display: flex;
      gap: 10px;
      background: var(--bg);
      z-index: 10;
    }

    .btn {
      flex: 1;
      min-height: 54px;
      border: none;
      border-radius: 0.8rem;
      font-size: 1rem;
      font-weight: 500;
      color: #fff;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn:active { transform: scale(0.98); }
    .btn.primary { background: var(--primary); border-color: var(--primary); }
    .btn.primary:active { background: var(--primary-active); }
    .btn.danger { background: var(--danger); border-color: var(--danger); }

    /* Скрытый инпут для URL GAS */
    .settings {
      padding: 0 15px 15px 15px;
      background: var(--bg);
    }
    .input-url {
      width: 100%;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text);
      padding: 12px;
      border-radius: 0.6rem;
      font-family: monospace;
      font-size: 0.8rem;
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>

  <div class="header">
    <div class="title">MOBILE SCANNER</div>
  </div>

  <div class="scanner-container">
    <div id="reader"></div>
    
    <div class="result-panel hidden" id="resultPanel">
      <div style="font-size: 0.85rem; color: var(--muted); text-align: center; text-transform: uppercase;">Считанный код</div>
      <div class="scanned-text" id="scannedCode">—</div>
      <button class="btn primary" id="sendBtn" onclick="sendData()">Отправить в базу</button>
    </div>
  </div>

  <div class="controls">
    <button class="btn primary" id="startBtn" onclick="startScanner()">СКАНИРОВАТЬ</button>
    <button class="btn danger" style="display:none;" id="stopBtn" onclick="stopScanner()">СТОП</button>
  </div>

  <div class="settings">
    <input type="text" class="input-url" id="apiUrl" placeholder="Вставьте URL Google Apps Script Web App..." />
  </div>

  <script>
    let html5QrCode;
    let currentCode = "";

    // Функция для очистки кода от мусора (если попадаются кривые ШК)
    function normalizeCode(raw) {
      let s = String(raw || '').trim();
      if (s.includes('-*-')) s = s.split('-*-')[1];
      if (s.startsWith('*')) s = s.slice(1);
      return s.replace(/\s+/g, '');
    }

    async function startScanner() {
      const readerElement = document.getElementById('reader');
      const resultPanel = document.getElementById('resultPanel');
      
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'flex';
      resultPanel.classList.add('hidden');

      html5QrCode = new Html5Qrcode("reader");

      // Адаптивная рамка: широкая для длинных штрихкодов, но не слишком высокая
      const config = { 
        fps: 10, 
        qrbox: function(viewfinderWidth, viewfinderHeight) {
            return {
                width: viewfinderWidth * 0.85,
                height: Math.min(viewfinderHeight * 0.35, 150) 
            };
        }
      };

      try {
        await html5QrCode.start(
          { facingMode: "environment" }, 
          config, 
          onScanSuccess
        );
      } catch (err) {
        alert("Ошибка доступа к камере: " + err);
        stopScanner();
      }
    }

    async function stopScanner() {
      if (html5QrCode) {
        try {
          await html5QrCode.stop();
          html5QrCode.clear();
        } catch (err) {
          console.error("Ошибка при остановке", err);
        }
      }
      document.getElementById('startBtn').style.display = 'flex';
      document.getElementById('stopBtn').style.display = 'none';
    }

    function onScanSuccess(decodedText) {
      // При успешном сканировании останавливаем камеру и показываем результат
      stopScanner();
      
      currentCode = normalizeCode(decodedText);
      document.getElementById('scannedCode').textContent = currentCode;
      
      // Показываем панель
      const resultPanel = document.getElementById('resultPanel');
      resultPanel.classList.remove('hidden');

      // Легкая вибрация при успешном сканировании (работает на большинстве смартфонов)
      if (navigator.vibrate) navigator.vibrate(100);
    }

    async function sendData() {
      const url = document.getElementById('apiUrl').value.trim();
      if (!url) {
        alert("Сначала укажите URL Web App внизу экрана.");
        return;
      }
      if (!currentCode) return;

      const btn = document.getElementById('sendBtn');
      const originalText = btn.textContent;
      btn.textContent = "Отправка...";
      btn.style.opacity = "0.7";

      const payload = {
        raw_code: currentCode,
        normalized_code: currentCode,
        timestamp: new Date().toISOString()
      };

      try {
        const response = await fetch(url, {
          method: 'POST',
          // ВАЖНО: text/plain обходит проблему CORS preflight запросов
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        
        if (result.ok) {
          btn.style.backgroundColor = "var(--success)";
          btn.style.borderColor = "var(--success)";
          btn.textContent = "Успешно!";
          if (navigator.vibrate) navigator.vibrate([50, 50, 50]); // Двойная вибрация успеха
          
          setTimeout(() => {
            document.getElementById('resultPanel').classList.add('hidden');
            btn.style.backgroundColor = "var(--primary)";
            btn.style.borderColor = "var(--primary)";
            btn.textContent = originalText;
            btn.style.opacity = "1";
            startScanner(); // Автоматически запускаем сканер снова
          }, 1500);
        } else {
          throw new Error(result.error || "Ошибка на сервере");
        }
      } catch (error) {
        alert("Не удалось отправить: " + error.message);
        btn.textContent = "Ошибка. Повторить?";
        btn.style.backgroundColor = "var(--danger)";
        btn.style.borderColor = "var(--danger)";
        btn.style.opacity = "1";
      }
    }
  </script>
</body>
</html>
